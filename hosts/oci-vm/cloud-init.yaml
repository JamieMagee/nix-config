  - 'sk-ssh-ed25519@openssh.com AAAAGnNrLXNzaC1lZDI1NTE5QG9wZW5zc2guY29tAAAAIJzX8m5ulb8Yh+mLQL1vqT1d9k0/Kjo6GvJJSRQxK9dxAAAABHNzaDo='
  - 'sk-ssh-ed25519@openssh.com AAAAGnNrLXNzaC1lZDI1NTE5QG9wZW5zc2guY29tAAAAIH9nPL5Z2gsdclYU43EjADaN4JmXMMTijxcv4cv7T7KtAAAABHNzaDo='
  - 'sk-ssh-ed25519@openssh.com AAAAGnNrLXNzaC1lZDI1NTE5QG9wZW5zc2guY29tAAAAIEfboykpOQU4syTfATJPL+CICYyZdVXOROU2O4iLmmA9AAAABHNzaDo='
write_files:
  - path: '/etc/ssh/sshd_config.d/permit_root'
    owner: 'root:root'
    permissions: '0644'
    content: |
      PermitRootLogin without-password
  - path: '/etc/iptables/rules.v4'
  - path: '/etc/iptables/rules.v6'

  - path: /etc/nixos/host.nix
    permissions: '0644'
    content: |
      {pkgs, lib, config, ...}:
      {
        environment.systemPackages = with pkgs; [ nano git ];
        networking.usePredictableInterfaceNames = true;

        nix = {
           package = pkgs.nixFlakes;
           extraOptions = lib.optionalString (config.nix.package == pkgs.nixFlakes)
             "experimental-features = nix-command flakes";
        };
      }

users:
  - name: ubuntu
    inactive: true

package_update: true
package_upgrade: false
package_reboot_if_required: false

locale: 'en_GB.UTF-8'
timezone: 'America/Los_Angeles'

runcmd:
  - /usr/libexec/oci-growfs -y
  - pkill OSWatcher
  - umount /var/oled
  - lvremove /dev/mapper/ocivolume-oled
  - lvresize -l +100%FREE /dev/mapper/ocivolume-root
  - >
    echo "drive d: file=\"/dev/sda1\" exclusive" > /etc/mtools.conf
  - echo "mtools_skip_check=1" >> /etc/mtools.conf
  - cp -a /boot /root/

  # Try to ensure we can unmount and remount /boot
  - sed -i '/boot/d' /etc/fstab
  - sed -i '/oled/d' /etc/fstab
  - systemctl disable boot.mount

  - umount /boot/efi
  - umount /boot

  - sgdisk -d 1 -d 2 -n 1:0:0 -t 1:ef00 -c 1:"EFI System Partition" /dev/sda
  - partprobe /dev/sda
  - mkfs.fat -F32 /dev/sda1

  - mount -v /dev/sda1 /boot
  - cp -a /root/boot /

  - >
    curl https://raw.githubusercontent.com/elitak/nixos-infect/master/nixos-infect |
    NO_SWAP=1
    NIXOS_IMPORT=./host.nix
    NIX_CHANNEL=nixos-unstable
    bash -x |
    tee /tmp/infect.log
